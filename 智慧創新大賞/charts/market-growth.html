<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全球 AI 心理健康市場規模</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAF8F4;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .chart-container {
    width: 800px; height: 500px;
    background: #FAF8F4;
    position: relative;
    padding: 40px 50px 60px 50px;
  }
  h2 {
    text-align: center;
    color: #3A2E2E;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #7B5EA7;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .source {
    position: absolute;
    bottom: 16px;
    right: 50px;
    font-size: 11px;
    color: #999;
  }
</style>
</head>
<body>
<div class="chart-container">
  <h2>全球 AI 心理健康市場規模</h2>
  <div class="subtitle">CAGR 23.29%</div>
  <svg viewBox="0 0 700 340" width="700" height="340">
    <defs>
      <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#D4926E"/>
        <stop offset="100%" stop-color="#C67A52"/>
      </linearGradient>
      <linearGradient id="barGrad2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C67A52"/>
        <stop offset="100%" stop-color="#A85F3A"/>
      </linearGradient>
      <linearGradient id="barGrad3" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#A85F3A"/>
        <stop offset="100%" stop-color="#8B4726"/>
      </linearGradient>
    </defs>

    <!-- Y 軸刻度線 -->
    <line x1="80" y1="280" x2="650" y2="280" stroke="#DDD" stroke-width="1"/>
    <line x1="80" y1="220" x2="650" y2="220" stroke="#EEE" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="80" y1="160" x2="650" y2="160" stroke="#EEE" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="80" y1="100" x2="650" y2="100" stroke="#EEE" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="80" y1="40" x2="650" y2="40" stroke="#EEE" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Y 軸標籤 -->
    <text x="70" y="284" text-anchor="end" font-size="12" fill="#999">$0B</text>
    <text x="70" y="224" text-anchor="end" font-size="12" fill="#999">$25B</text>
    <text x="70" y="164" text-anchor="end" font-size="12" fill="#999">$50B</text>
    <text x="70" y="104" text-anchor="end" font-size="12" fill="#999">$75B</text>
    <text x="70" y="44" text-anchor="end" font-size="12" fill="#999">$100B</text>

    <!-- 柱子：$17.1B → 高度 = 17.1/100 * 240 = 41 -->
    <rect x="150" y="239" width="100" height="41" rx="6" ry="6" fill="url(#barGrad1)"/>
    <text x="200" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#C67A52">$17.1B</text>
    <text x="200" y="305" text-anchor="middle" font-size="14" fill="#555">2025</text>

    <!-- 柱子：$35.2B → 高度 = 35.2/100 * 240 = 84.5 -->
    <rect x="310" y="195.5" width="100" height="84.5" rx="6" ry="6" fill="url(#barGrad2)"/>
    <text x="360" y="188" text-anchor="middle" font-size="16" font-weight="700" fill="#A85F3A">$35.2B</text>
    <text x="360" y="305" text-anchor="middle" font-size="14" fill="#555">2028（估）</text>

    <!-- 柱子：$91.2B → 高度 = 91.2/100 * 240 = 218.9 -->
    <rect x="470" y="61.1" width="100" height="218.9" rx="6" ry="6" fill="url(#barGrad3)"/>
    <text x="520" y="54" text-anchor="middle" font-size="16" font-weight="700" fill="#8B4726">$91.2B</text>
    <text x="520" y="305" text-anchor="middle" font-size="14" fill="#555">2033</text>

    <!-- 成長箭頭曲線 -->
    <path d="M 200 235 Q 360 120 520 58" stroke="#7B5EA7" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
    <polygon points="518,52 526,58 518,64" fill="#7B5EA7"/>

    <!-- CAGR 標註 -->
    <rect x="340" y="98" width="120" height="28" rx="14" fill="#7B5EA7" opacity="0.12"/>
    <text x="400" y="117" text-anchor="middle" font-size="13" font-weight="600" fill="#7B5EA7">CAGR 23.29%</text>
  </svg>
  <div class="source">來源：Grand View Research, 2025</div>
</div>
</body>
</html>
